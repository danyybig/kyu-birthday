<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kyuties Around the World 🤎 | Birthday Project for Kyu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f3ed;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #5a3e2b;
      margin-bottom: 25px;
    }
    #wall {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }
    .note {
      background: #f3e1c8;
      padding: 15px;
      width: 230px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      transform: rotate(calc(-2deg + 4deg * var(--r)));
      font-size: 14px;
      border-radius: 8px;
      color: #3c2f26;
    }
    .note b {
      display: block;
      margin-bottom: 8px;
      color: #4a2d18;
    }
  </style>
</head>
<body>

<h1>Birthday Messages for Kyu 🤎</h1>

<div id="wall"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTbUdGokUKpM5gV-2ZGER3Jgq2LUBiD3qFWG3Mdx9gTW53ulUBLMT2tE3KLA3HKj_YC2uVh6lkT1vmL/pub?output=csv")
  .then(res => res.text())
  .then(data => {
    let rows = data.split("\n").slice(1);
    rows.forEach(row => {
      let cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      let name = cols[1] || "Anonymous";
      let country = cols[2] || "";
      let message = cols[3] || "";

      if (!message.trim()) return;

      let note = document.createElement("div");
      note.className = "note";
      note.style.setProperty("--r", Math.random());

      note.innerHTML =
        "<b>From:</b> " + name + " (" + country + ")<br>" +
        message.replace(/\"/g, "");

      document.getElementById("wall").appendChild(note);
    });
  });
</script>

</body>
</html>
